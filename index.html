<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Frenos Dulanto - Catálogo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="cargando">

    <div id="pantalla-carga">
        <img src="logo.png" alt="Frenos Dulanto" class="logo-splash">
        <div class="loader-container">
            <div class="barra-lujo"></div>
        </div>
        <p class="est-text">EST. 1974</p>
    </div>

    <div class="header-fijo">
        <input type="text" id="bus" placeholder="Buscar repuesto..." oninput="ejecutarFiltro()">
        <div class="filtros-container">
            <button id="btnCat" onclick="toggleMenu('mCat', 'btnCat', event)">Categoría: <span id="lCat">Todas</span></button>
            <button id="btnMar" onclick="toggleMenu('mMar', 'btnMar', event)">Marca: <span id="lMar">Todas</span></button>
        </div>
    </div>

    <div id="mCat" class="menu-content">
        <div class="menu-item active" onclick="setFiltro('cat', 'todas', 'Todas', this, event)">Todas</div>
        </div>
    
    <div id="mMar" class="menu-content">
        <div class="menu-item active" onclick="setFiltro('mar', 'todas', 'Todas', this, event)">Todas</div>
    </div>

    <main id="contenedor"></main>

    <div id="btnCart" class="boton-flotante cart" onclick="toggleCartModal(event)">
        🛒 <span id="cartBadge">0</span>
    </div>
    
    <a href="https://wa.me/51947429347" class="boton-flotante wsp" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
    </a>

    <div id="cartModal" class="modal">
        <div class="modal-content">
            <h3>Tu Pedido</h3>
            <div id="cartList"></div>
            <div class="total">Total: <span id="totalLabel">S/ 0</span></div>
            <button class="btn-send" onclick="sendWhatsApp()">Enviar a WhatsApp</button>
            <button class="btn-close" onclick="toggleCartModal(event)">Cerrar</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
