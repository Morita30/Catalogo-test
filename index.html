<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frenos Dulanto - Catálogo Profesional</title>
    <link rel="stylesheet" href="style.css">
</head>
<body> 

<div class="brand-bar">
  <img src="logo.png" alt="Logo Frenos Dulanto" class="brand-logo">
</div>

<div class="sticky-controls">
  <div class="header-controls">
    <input type="text" id="bus" class="search-input" placeholder="🔍 Buscar producto..." onkeyup="ejecutarFiltro()">

    <div class="selectors-row">
      <div class="menu-dropdown">
        <button class="btn-menu" onclick="toggleMenu('mCat', event)">⚙️ <span id="lCat">Pieza</span></button>
        <div class="menu-content" id="mCat">
          <div class="menu-item active" onclick="setFiltro('cat', 'todas', 'Todas', this, event)">Todas</div>
          <div class="menu-item" onclick="setFiltro('cat', 'pastilla', 'Pastillas', this, event)">Pastillas</div>
          <div class="menu-item" onclick="setFiltro('cat', 'disco', 'Discos', this, event)">Discos</div>
          <div class="menu-item" onclick="setFiltro('cat', 'zapata', 'Zapatas', this, event)">Zapatas</div>
          <div class="menu-item" onclick="setFiltro('cat', 'amortiguador', 'Amortiguadores', this, event)">Amortiguadores</div>
          <div class="menu-item" onclick="setFiltro('cat', 'radiador', 'Radiadores', this, event)">Radiadores</div>
          <div class="menu-item" onclick="setFiltro('cat', 'embrague', 'Embragues', this, event)">Embragues</div>
        </div>
      </div>

      <div class="menu-dropdown">
        <button class="btn-menu" onclick="toggleMenu('mMar', event)">🚗 <span id="lMar">Marcas</span></button>
        <div class="menu-content" id="mMar">
          <div class="menu-item active" onclick="setFiltro('marca', 'todas', 'Todas', this, event)">Todas</div>
          <div class="menu-item" onclick="setFiltro('marca', 'toyota', 'Toyota', this, event)">Toyota</div>
          <div class="menu-item" onclick="setFiltro('marca', 'nissan', 'Nissan', this, event)">Nissan</div>
          <div class="menu-item" onclick="setFiltro('marca', 'hyundai', 'Hyundai', this, event)">Hyundai</div>
          <div class="menu-item" onclick="setFiltro('marca', 'kia', 'Kia', this, event)">Kia</div>
          <div class="menu-item" onclick="setFiltro('marca', 'mitsubishi', 'Mitsubishi', this, event)">Mitsubishi</div>
        </div>
      </div>

      <button class="btn-cart-header" id="btnCart" onclick="toggleCartModal(event)">
        🛒 <span class="badge-header" id="cartBadge">0</span>
      </button>

    </div>
  </div>
</div> 

<div id="cartModal">
  <div style="font-weight:800; display:flex; justify-content:space-between; border-bottom:1px solid #eee; padding-bottom:8px;">
    <span>Mi Pedido</span><span id="totalLabel">S/ 0</span>
  </div>
  <div class="cart-items-list" id="cartList"></div>
  <button style="background:var(--verde-wa); color:white; border:none; width:100%; padding:14px; border-radius:12px; font-weight:700; cursor:pointer; margin-top:10px;" onclick="sendWhatsApp()">WhatsApp</button>
</div> 

<div class="grid" id="contenedor"></div> 

<script src="database.js"></script>
<script>
  let cart = {};
  let fCat = 'todas', fMarca = 'todas'; 

  // --- FUNCIÓN DE RENDERIZADO MEJORADA (Estructura para Loop Infinito) ---
  function renderProductos() {
    const cont = document.getElementById('contenedor');
    cont.innerHTML = "";
    productosData.forEach((p, i) => {
      // Estructura HTML para loop: [Clon 3] [1] [2] [3] [Clon 1]
      cont.innerHTML += `
        <div class="card" data-tipo="${p.c}" data-marca="${p.m}" data-full="${p.n} ${p.m}">
          <div class="carousel-container" id="container-${i}" ontouchstart="handleTouchStart(event, ${i})" ontouchend="handleTouchEnd(event, ${i})">
            <div class="carousel-track" id="track-${i}" data-idx="1" data-cloning="false">
              <img src="${imgUrlBase}"> 
              <img src="${imgUrlBase}"><img src="${imgUrlBase}"><img src="${imgUrlBase}">
              <img src="${imgUrlBase}">
            </div>
            <div class="carousel-indicators">
              <span class="dot active" data-dot="0"></span>
              <span class="dot" data-dot="1"></span>
              <span class="dot" data-dot="2"></span>
            </div>
          </div>
          <div class="brand-tag">${p.m}</div>
          <h3 style="font-size:12px; margin:3px 0; min-height:30px;">${p.n}</h3>
          <div class="price-tag">S/ ${p.p}.00</div>
          <button class="btn-add" onclick="addToCart('${p.n}', ${p.p}, event)">Añadir</button>
        </div>`;
    });
  }

  // --- LÓGICA DE CARRUSEL INFINITO REAL (Con Clonación y Reposicionamiento) ---
  let touchStartX = 0;
  function handleTouchStart(e, id) { 
    touchStartX = e.changedTouches[0].screenX; 
  }

  function handleTouchEnd(e, id) {
    let touchEndX = e.changedTouches[0].screenX;
    let diff = touchStartX - touchEndX;
    // Sensibilidad del swipe
    if (Math.abs(diff) > 40) moveCarouselInfinite(id, diff > 0 ? 1 : -1);
  }

  function moveCarouselInfinite(id, dir) {
    const track = document.getElementById(`track-${id}`);
    const container = document.getElementById(`container-${id}`);
    const indicators = container.querySelectorAll('.dot');
    
    // Bloquear si ya estamos reposicionando un clon
    if (!track || track.getAttribute('data-cloning') === 'true') return;

    // Índice actual basado en la estructura de 5 imágenes (0 a 4)
    // Empezamos en 1 (primera real), no 0 (clon de la última)
    let currentIdx = parseInt(track.getAttribute('data-idx'));
    
    // Calcular siguiente índice sin restricciones
    let nextIdx = currentIdx + dir;

    // Habilitar animación para el movimiento normal
    track.classList.remove('no-transition');
    
    // Mover (cada imagen es 20% del ancho del track)
    track.style.transform = `translateX(-${nextIdx * 20}%)`;
    track.setAttribute('data-idx', nextIdx);

    // Actualizar indicadores (basados en 0, 1, 2 reales)
    let indicatorIdx;
    if (nextIdx === 4) indicatorIdx = 0;      // Estamos en clon de 1
    else if (nextIdx === 0) indicatorIdx = 2; // Estamos en clon de 3
    else indicatorIdx = nextIdx - 1;          // Ajuste índice real

    indicators.forEach(i => i.classList.remove('active'));
    indicators[indicatorIdx].classList.add('active');

    // --- GESTIÓN DEL SALTO INVISIBLE (REPOSICIONAMIENTO) ---
    // Si llegamos a un clon (índice 0 o 4), reposicionamos al terminar la animación
    if (nextIdx === 0 || nextIdx === 4) {
      track.setAttribute('data-cloning', 'true'); // Bloquear nuevos swipes

      // Esperar a que termine la transición CSS (0.4s)
      setTimeout(() => {
        // Quitar animación instantáneamente
        track.classList.add('no-transition');

        let jumpIdx;
        if (nextIdx === 4) jumpIdx = 1; // De clon 1 saltar a 1 real
        if (nextIdx === 0) jumpIdx = 3; // De clon 3 saltar a 3 real

        // Mover instantáneamente
        track.style.transform = `translateX(-${jumpIdx * 20}%)`;
        track.setAttribute('data-idx', jumpIdx);

        // Desbloquear para siguientes swipes
        track.setAttribute('data-cloning', 'false');
      }, 400); // Mismo tiempo que la transición CSS
    }
  }

  // --- LÓGICA DE FUNCIONAMIENTO ---
  function ejecutarFiltro() {
    const query = document.getElementById('bus').value.toLowerCase().trim();
    const palabras = query.split(/\s+/); 
    document.querySelectorAll('.card').forEach(c => {
      const txt = c.getAttribute('data-full').toLowerCase();
      const matchCat = (fCat === 'todas' || c.getAttribute('data-tipo') === fCat);
      const matchMar = (fMarca === 'todas' || c.getAttribute('data-marca') === fMarca); 
      const matchBus = palabras.every(p => txt.includes(p)); 
      if (matchCat && matchMar && matchBus) c.classList.remove('hidden'); else c.classList.add('hidden');
    });
  }

  function addToCart(name, price, event) {
    if (cart[name]) cart[name].qty++; else cart[name] = { price, qty: 1 };
    updateCartUI();

    const btnCart = document.getElementById('btnCart');
    const rectCart = btnCart.getBoundingClientRect();

    const flyer = document.createElement('div');
    flyer.className = 'flying-item';
    flyer.style.left = `${event.clientX - 20}px`;
    flyer.style.top = `${event.clientY - 20}px`;

    document.body.appendChild(flyer);

    setTimeout(() => {
        flyer.style.left = `${rectCart.left + (rectCart.width / 2) - 20}px`;
        flyer.style.top = `${rectCart.top + (rectCart.height / 2) - 20}px`;
        flyer.style.transform = 'scale(0.1)';
        flyer.style.opacity = '0';
    }, 10);

    setTimeout(() => {
        flyer.remove();
        btnCart.style.transition = 'transform 0.2s';
        btnCart.style.transform = 'scale(1.3)';
        setTimeout(() => btnCart.style.transform = 'scale(1)', 200);
    }, 700);
}

  function changeQty(name, delta, e) {
    e.stopPropagation();
    cart[name].qty += delta;
    if (cart[name].qty <= 0) delete cart[name];
    updateCartUI();
  } 

  function updateCartUI() {
    const list = document.getElementById('cartList');
    let total = 0, count = 0;
    list.innerHTML = "";
    for (const n in cart) {
      total += cart[n].price * cart[n].qty;
      count += cart[n].qty;
      list.innerHTML += `<div class="cart-item">
        <div style="text-align:left; font-size:12px"><strong>${n}</strong><br>S/ ${cart[n].price * cart[n].qty}</div>
        <div style="display:flex; align-items:center; gap:5px">
          <button style="background:#f0f0f5; border:none; width:26px; height:26px; border-radius:6px;" onclick="changeQty('${n}', -1, event)">-</button>
          <span style="font-weight:700">${cart[n].qty}</span>
          <button style="background:#f0f0f5; border:none; width:26px; height:26px; border-radius:6px;" onclick="changeQty('${n}', 1, event)">+</button>
        </div>
      </div>`;
    }
    document.getElementById('cartBadge').innerText = count;
    document.getElementById('totalLabel').innerText = `S/ ${total}`;
  } 

  function toggleMenu(id, e) {
    e.stopPropagation();
    const menu = document.getElementById(id);
    const showing = menu.classList.contains('show');
    document.querySelectorAll('.menu-content').forEach(m => m.classList.remove('show'));
    if(!showing) menu.classList.add('show');
    document.getElementById('cartModal').style.display = 'none';
  } 

  function setFiltro(tipo, val, txt, el, e) {
  e.stopPropagation();
  if(tipo === 'cat') { 
    fCat = val; 
    document.getElementById('lCat').innerText = txt; 
    const btn = document.getElementById('lCat').parentElement;
    if(val === 'todas') btn.classList.remove('active-filter'); else btn.classList.add('active-filter');
  } 
  else { 
    fMarca = val; 
    document.getElementById('lMar').innerText = txt; 
    const btn = document.getElementById('lMar').parentElement;
    if(val === 'todas') btn.classList.remove('active-filter'); else btn.classList.add('active-filter');
  }
  document.querySelectorAll(`#m${tipo === 'cat' ? 'Cat' : 'Mar'} .menu-item`).forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.menu-content').forEach(m => m.classList.remove('show'));
  ejecutarFiltro();
}

  function toggleCartModal(e) {
    e.stopPropagation();
    const m = document.getElementById('cartModal');
    m.style.display = m.style.display === 'block' ? 'none' : 'block';
    document.querySelectorAll('.menu-content').forEach(m => m.classList.remove('show'));
  }

  function sendWhatsApp() {
    let msg = "Hola *Frenos Dulanto*, mi pedido:%0A";
    let t = 0;
    for (const n in cart) {
      msg += `• ${cart[n].qty} x ${n} - S/ ${cart[n].price * cart[n].qty}%0A`;
      t += cart[n].price * cart[n].qty;
    }
    msg += `%0ATOTAL: S/ ${t}.00`;
    window.open(`https://wa.me/51947429347?text=${msg}`, '_blank');
  } 

  window.onclick = () => {
    document.getElementById('cartModal').style.display = 'none';
    document.querySelectorAll('.menu-content').forEach(m => m.classList.remove('show'));
  };

  renderProductos();
</script>
</body>
</html>
